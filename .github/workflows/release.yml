name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Verify Swift toolchain
        run: |
          set -euo pipefail
          SWIFT_VERSION="$(swift --version | awk '/Swift version/{print $4; exit}')"
          echo "Swift version: ${SWIFT_VERSION}"
          if [[ "$(printf '%s\n' "${SWIFT_VERSION}" "6.2" | sort -V | tail -n1)" != "${SWIFT_VERSION}" ]]; then
            echo "Swift ${SWIFT_VERSION} is lower than required 6.2"
            exit 1
          fi

      - name: Validate tag format
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ ! "$TAG" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-([0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*))?(\+([0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*))?$ ]]; then
            echo "Invalid tag format: $TAG"
            echo "Expected: v<MAJOR>.<MINOR>.<PATCH> (SemVer)"
            exit 1
          fi

      - name: Validate app version matches tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          TAG_VERSION="${TAG#v}"
          SHORT_VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' packaging/Info.plist)"
          BUILD_VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' packaging/Info.plist)"
          if [[ "$SHORT_VERSION" != "$TAG_VERSION" || "$BUILD_VERSION" != "$TAG_VERSION" ]]; then
            echo "Tag version ($TAG_VERSION) does not match Info.plist versions (short=$SHORT_VERSION build=$BUILD_VERSION)."
            exit 1
          fi

      - name: Build distributable
        run: |
          set -euo pipefail
          make dmg

      - name: Generate release notes
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          PREV_TAG=""
          MERGED_REF="${TAG}^"
          if ! git rev-parse --verify "${TAG}^" >/dev/null 2>&1; then
            MERGED_REF="$TAG"
          fi

          while IFS= read -r candidate; do
            if [[ "$candidate" == "$TAG" ]]; then
              continue
            fi
            if [[ "$candidate" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-([0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*))?(\+([0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*))?$ ]]; then
              PREV_TAG="$candidate"
              break
            fi
          done < <(git tag --merged "$MERGED_REF" --sort=-creatordate || true)

          if [[ -n "$PREV_TAG" ]]; then
            RANGE="${PREV_TAG}..${TAG}"
          else
            RANGE="$TAG"
          fi

          NOTES_FILE="dist/release-notes.md"
          mkdir -p dist

          {
            echo "## Release ${TAG}"
            echo
            if [[ -n "$PREV_TAG" ]]; then
              echo "- Range: \\`${PREV_TAG}..${TAG}\\`"
              echo "- Compare: https://github.com/${REPO}/compare/${PREV_TAG}...${TAG}"
            else
              echo "- Range: first tagged release"
              echo "- Compare: https://github.com/${REPO}/releases/tag/${TAG}"
            fi
            echo
            echo "## Changes"
          } > "$NOTES_FILE"

          LOG_LINES=$(git log --no-merges --pretty='- %s (%h)' "$RANGE" || true)
          if [[ -z "${LOG_LINES}" ]]; then
            echo "- No commits found in this range" >> "$NOTES_FILE"
          else
            echo "$LOG_LINES" >> "$NOTES_FILE"
          fi

          echo "Generated release notes:"
          cat "$NOTES_FILE"

      - name: Generate appcast
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          VERSION="${TAG#v}"
          APPCAST_FILE="dist/appcast.xml"
          RELEASE_NOTES_FILE="dist/release-notes.md"
          PUB_DATE="$(LC_ALL=C date -u '+%a, %d %b %Y %H:%M:%S +0000')"

          if [[ -f "dist/MdMonitor.dmg" ]]; then
            ASSET_NAME="MdMonitor.dmg"
            MIME_TYPE="application/x-apple-diskimage"
            ASSET_SIZE="$(stat -f%z dist/MdMonitor.dmg)"
          elif [[ -f "dist/MdMonitor.zip" ]]; then
            ASSET_NAME="MdMonitor.zip"
            MIME_TYPE="application/zip"
            ASSET_SIZE="$(stat -f%z dist/MdMonitor.zip)"
          else
            echo "No release archive found in dist/"
            exit 1
          fi

          ASSET_URL="https://github.com/${REPO}/releases/download/${TAG}/${ASSET_NAME}"
          FEED_LINK="https://github.com/${REPO}/releases/latest/download/appcast.xml"
          RELEASE_URL="https://github.com/${REPO}/releases/tag/${TAG}"

          DESCRIPTION_TEXT="$(sed 's/&/\\&amp;/g; s/</\\&lt;/g; s/>/\\&gt;/g' "${RELEASE_NOTES_FILE}")"

          cat > "${APPCAST_FILE}" <<XML
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0"
              xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle"
              xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>MdMonitor Updates</title>
              <link>${FEED_LINK}</link>
              <description>MdMonitor release feed</description>
              <language>en</language>
              <item>
                <title>${TAG}</title>
                <link>${RELEASE_URL}</link>
                <description>${DESCRIPTION_TEXT}</description>
                <pubDate>${PUB_DATE}</pubDate>
                <enclosure
                  url="${ASSET_URL}"
                  length="${ASSET_SIZE}"
                  type="${MIME_TYPE}"
                  sparkle:version="${VERSION}"
                  sparkle:shortVersionString="${VERSION}" />
              </item>
            </channel>
          </rss>
          XML

          echo "Generated appcast:"
          cat "${APPCAST_FILE}"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body_path: dist/release-notes.md
          files: |
            dist/MdMonitor.dmg
            dist/MdMonitor.zip
            dist/appcast.xml
          fail_on_unmatched_files: false
