<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | strip_newlines }}" />
    <link rel="stylesheet" href="{{ '/assets/styles.css' | relative_url }}" />
  </head>
  <body>
    <header class="shell">
      <a class="brand" href="{{ '/' | relative_url }}">MdMonitor Blog</a>
      <span class="sub">Build log, release notes, and product stories</span>
    </header>

    <main class="shell content">{{ content }}</main>

    <footer class="shell foot">
      <span>Powered by GitHub Pages · Source in <code>site/</code></span>
    </footer>
  </body>
</html>
